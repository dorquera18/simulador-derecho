services:
  - type: web
    name: simulador-derecho-ufv
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: derecho2024
      - key: DATABASE_URL
        value: /opt/render/project/src/data/simulador.db
    disk:
      name: simulador-db
      mountPath: /opt/render/project/src/data
      sizeGB: 1
